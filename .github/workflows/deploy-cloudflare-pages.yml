# Deploy static build to Cloudflare Pages (custom domain: theunitedstates.site)
# Repo: https://github.com/3000Studios/theunitedstates-site
#
# Setup (one-time in GitHub → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — API Token with "Cloudflare Pages — Edit" (and Account read)
#   CLOUDFLARE_ACCOUNT_ID — from Cloudflare dashboard sidebar
#
# Or use Cloudflare Dashboard → Workers & Pages → Connect to Git instead of this workflow.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=theunitedstates-site --branch=main
